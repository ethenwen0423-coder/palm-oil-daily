<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>场外结构建议 | Vinson Research</title>
    <meta name="description" content="根据最新期货行情与技术分析，研判适合的场外结构并说明推荐原因。" />
    <link rel="icon" href="data:," />
    <script>
      window.OTC_CACHE_BUST = Date.now();
      document.write('<link rel="stylesheet" href="assets/styles.css?v=' + window.OTC_CACHE_BUST + '" />');
    </script>
  </head>
  <body class="otc-page">
    <header class="quant-header">
      <div class="shell quant-header-inner">
        <a class="quant-back" href="index.html">← 返回研究首页</a>
        <div class="quant-brand">Vinson Research <span>OTC Structuring</span></div>
      </div>
    </header>

    <main>
      <section class="otc-hero">
        <div class="shell otc-hero-grid">
          <div class="otc-intro">
            <p class="otc-eyebrow">Market View · Structure</p>
            <h1>行情适合<br />什么结构</h1>
            <p>把趋势、波动与观点置信度压缩成一个结构结论，并说明为什么是它。</p>
          </div>

          <form id="otc-form" class="otc-form" novalidate>
            <div class="otc-form-heading">
              <span>01</span>
              <div>
                <strong>选择分析合约</strong>
                <small>基于最新行情自动研判</small>
              </div>
            </div>

            <label class="otc-field">
              <span>选择标的合约</span>
              <select id="otc-contract" name="contract" required>
                <option value="">读取合约列表…</option>
              </select>
            </label>

            <p id="otc-form-error" class="otc-form-error" role="alert"></p>
            <button class="otc-submit" type="submit">生成结构建议 <span>→</span></button>
          </form>
        </div>
      </section>

      <section id="otc-result" class="shell otc-result" aria-live="polite">
        <div class="otc-result-empty">
          <span>02</span>
          <strong>等待行情研判</strong>
          <p>选择合约后生成行情结论、推荐结构与核心依据。</p>
        </div>
      </section>
    </main>

    <footer class="quant-footer">
      <div class="shell">
        <p>仅作企业风险管理与结构研究参考，不构成投资建议、报价或交易要约。</p>
        <a href="oil-futures.html">查看行情依据 →</a>
      </div>
    </footer>

    <script>document.write('<script src="data/oil_futures.js?v=' + window.OTC_CACHE_BUST + '"><\/script>');</script>
    <script>document.write('<script src="assets/otc-structure.js?v=' + window.OTC_CACHE_BUST + '"><\/script>');</script>
  </body>
</html>
