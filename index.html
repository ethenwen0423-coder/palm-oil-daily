<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>棕榈油行情报告 | vinsontesla.com</title>
    <meta
      name="description"
      content="每日棕榈油期货、现货、库存、外盘与宏观要点汇总。"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="shell header-grid">
        <div>
          <p class="eyebrow">Palm Oil Reports</p>
          <h1>棕榈油行情报告</h1>
          <p class="subtitle">交易日晨报与周末复盘分组归档，点击标题查看完整分析。</p>
        </div>
        <div class="status-panel" aria-live="polite">
          <span class="label">最新日期</span>
          <strong id="latest-date">等待生成</strong>
          <span id="latest-updated">自动发布准备中</span>
        </div>
      </div>
    </header>

    <main class="shell layout">
      <section class="report-view report-index" aria-labelledby="daily-title">
        <div class="report-toolbar">
          <div>
            <p class="section-label">Daily</p>
            <h2 id="daily-title">日报</h2>
          </div>
        </div>
        <div id="daily-list" class="report-link-list"></div>
      </section>

      <aside class="archive" aria-labelledby="weekly-title">
        <h2 id="weekly-title">周报</h2>
        <div id="weekly-list" class="report-link-list compact"></div>
      </aside>
    </main>

    <footer class="site-footer">
      <div class="shell">
        <p>仅作研究和信息整理，不构成投资建议。</p>
      </div>
    </footer>

    <script src="data/reports.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
