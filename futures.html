    <script>
      window.FUTURES_CACHE_BUST = Date.now();
      document.write('<link rel="stylesheet" href="assets/styles.css?v=' + window.FUTURES_CACHE_BUST + '" />');
    </script>
  </head>
  <body class="futures-analysis-page">
    <header class="futures-page-header">
      <div class="shell futures-page-nav">
        <a href="index.html" class="futures-back">← 返回棕榈油研究</a>
        <span class="futures-nav-brand"><span class="brand-signal" aria-hidden="true"><i></i><i></i><i></i></span>Vinson Research</span>
      </div>
      <div class="shell futures-page-intro">
        <p>大商所 / 郑商所 / 上期所 / 广期所 / 中金所</p>
        <h1>国内期货主力合约分析</h1>
        <span>选择一个品种，查看当期流动性排名第一的具体合约及其研究要点。</span>
      </div>
    </header>

    <main class="shell futures-analysis-layout">
      <section class="contract-picker" aria-labelledby="contract-picker-title">
        <div>
          <p>合约选择</p>
          <h2 id="contract-picker-title">选择主力合约</h2>
        </div>
        <div class="contract-picker-controls">
          <label>
            交易所
            <select id="exchange-filter"><option value="all">全部交易所</option><option value="DCE">大商所</option><option value="CZCE">郑商所</option><option value="SHFE">上期所</option><option value="GFEX">广期所</option><option value="CFFEX">中金所</option></select>
          </label>
          <label>
            品种与合约
            <select id="contract-select"><option value="">等待数据加载</option></select>
          </label>
          <button id="contract-confirm" type="button">确认</button>
        </div>
        <p id="contract-picker-note" class="contract-picker-note">合约按实时成交量、持仓量排序选取主力；点击确认后展开分析。</p>
      </section>

      <section id="contract-analysis-result" class="contract-analysis-result" aria-live="polite">
        <div class="analysis-empty">请选择合约并确认。</div>
      </section>
    </main>

    <footer class="futures-page-footer"><div class="shell"><span id="futures-data-source">数据源等待加载</span><span>仅作研究跟踪，不构成投资建议。</span></div></footer>
